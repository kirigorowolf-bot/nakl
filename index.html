<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учёт оплат</title>
    
    <!-- Ссылка на файл манифеста (создай его отдельно как manifest.json) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #f5f5f5;
        }
        iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Вставь сюда свою ссылку на опубликованное приложение (которая /exec) -->
    <iframe src="ТВОЯ_ССЫЛКА_APPS_SCRIPT_EXEC"></iframe>

    <script>
        // Регистрация Service Worker (обязательно для кнопки "Установить")
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Service Worker зарегистрирован"))
                .catch(err => console.log("Ошибка SW:", err));
        }
    </script>
</body>
</html>
